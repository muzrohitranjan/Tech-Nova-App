<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Tech Nova</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-utensils"></i>
                <span>Tech Nova</span>
            </a>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="categories.html">Recipes</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="submit.html">Submit Recipe</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
            <div class="nav-auth">
                <button class="btn-login" id="loginBtn">Login</button>
                <div class="user-menu" id="userMenu">
                    <button class="user-avatar">
                        <i class="fas fa-user"></i>
                    </button>
                    <div class="dropdown-menu">
                        <a href="my-recipes.html"><i class="fas fa-book"></i> My Recipes</a>
                        <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Profile Section -->
    <section class="profile-section">
        <div class="container">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h1 id="userName">User Name</h1>
                        <p id="userEmail">user@email.com</p>
                    </div>
                </div>

                <div class="profile-tabs">
                    <button class="profile-tab active" data-tab="info">Account Info</button>
                    <button class="profile-tab" data-tab="devices">My Devices</button>
                </div>

                <div class="profile-content" id="infoTab">
                    <h2>Account Information</h2>
                    <form id="profileForm">
                        <div class="form-group">
                            <label for="profileName">Full Name</label>
                            <input type="text" id="profileName" placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label for="profileEmail">Email</label>
                            <input type="email" id="profileEmail" disabled>
                        </div>
                        <button type="submit" class="btn-submit">Update Profile</button>
                    </form>
                </div>

                <div class="profile-content" id="devicesTab" style="display: none;">
                    <h2>Registered Devices</h2>
                    <p>Devices registered for push notifications</p>
                    <div id="devicesList">
                        <!-- Devices loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <i class="fas fa-utensils"></i>
                        <span>Tech Nova</span>
                    </a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Tech Nova. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Profile Page JavaScript
        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
        });

        function initProfile() {
            const authToken = localStorage.getItem('auth_token');
            
            if (!authToken) {
                window.location.href = 'index.html';
                return;
            }

            loadProfile();
            initTabs();
        }

        async function loadProfile() {
            try {
                const response = await fetch('http://localhost:8000/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    }
                });

                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('userName').textContent = user.full_name || 'User';
                    document.getElementById('userEmail').textContent = user.email;
                    document.getElementById('profileName').value = user.full_name || '';
                    document.getElementById('profileEmail').value = user.email;
                } else {
                    // Demo mode
                    document.getElementById('userName').textContent = 'Demo User';
                    document.getElementById('userEmail').textContent = 'demo@technova.com';
                    document.getElementById('profileName').value = 'Demo User';
                    document.getElementById('profileEmail').value = 'demo@technova.com';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('userName').textContent = 'Demo User';
                document.getElementById('userEmail').textContent = 'demo@technova.com';
            }

            loadDevices();
        }

        function initTabs() {
            const tabs = document.querySelectorAll('.profile-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    const tabName = tab.dataset.tab;
                    document.getElementById('infoTab').style.display = tabName === 'info' ? 'block' : 'none';
                    document.getElementById('devicesTab').style.display = tabName === 'devices' ? 'block' : 'none';
                });
            });
        }

        async function loadDevices() {
            const devicesList = document.getElementById('devicesList');
            
            try {
                const response = await fetch('http://localhost:8000/api/devices/', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayDevices(devicesList, data.devices || []);
                } else {
                    displayDemoDevices(devicesList);
                }
            } catch (error) {
                console.error('Error loading devices:', error);
                displayDemoDevices(devicesList);
            }
        }

        function displayDevices(container, devices) {
            if (devices.length === 0) {
                container.innerHTML = '<p>No devices registered</p>';
                return;
            }
            
            container.innerHTML = devices.map(device => `
                <div class="sidebar-item">
                    <span class="sidebar-label">
                        <i class="fas fa-${device.device_type === 'mobile' ? 'mobile-alt' : device.device_type === 'tablet' ? 'tablet-alt' : 'laptop'}"></i>
                        ${device.device_name || device.device_type}
                    </span>
                    <span class="sidebar-value">${device.os_type || 'Unknown'} - ${device.is_active ? 'Active' : 'Inactive'}</span>
                </div>
            `).join('');
        }

        function displayDemoDevices(container) {
            container.innerHTML = `
                <div class="sidebar-item">
                    <span class="sidebar-label"><i class="fas fa-mobile-alt"></i> Mobile Device</span>
                    <span class="sidebar-value">Active</span>
                </div>
            `;
        }

        // Profile form submit
        document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('profileName').value;
            
            try {
                const response = await fetch('http://localhost:8000/api/auth/me', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    },
                    body: JSON.stringify({ full_name: name })
                });

                if (response.ok) {
                    document.getElementById('userName').textContent = name;
                    alert('Profile updated successfully!');
                } else {
                    alert('Profile updated! (Demo Mode)');
                }
            } catch (error) {
                alert('Profile updated! (Demo Mode)');
            }
        });
    </script>
</body>
</html>
